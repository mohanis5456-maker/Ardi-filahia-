<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تقديم الطلب - ARDI EL FILAHIA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>تقديم طلب أرض فلاحية</h1>
    <form id="requestForm">
        <label>نوع الطلب:</label>
        <select id="requestType">
            <option>استغلال أرض</option>
            <option>رخصة فلاحية</option>
            <option>حفر بئر</option>
            <option>سقي</option>
        </select><br>
        <label>رفع المستندات:</label>
        <input type="file" id="documents" multiple><br>
        <button type="submit">إرسال الطلب</button>
    </form>
    <script src="js/script.js"></script>
</body>
</html>
